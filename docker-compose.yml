services:
  mix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mix-app
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      PORT: 3001
    restart: unless-stopped
    networks:
      - mix-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mix-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - mix-net

volumes:
  qdrant-data:

networks:
  mix-net:
    driver: bridge
