version: "3.9"

services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    volumes:
      - ../../:/app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_LOCAL_COPILOT_MODE: "true"
      LOCAL_API_URL: http://api:8000
    depends_on:
      - api

  api:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.local.txt && uvicorn local_copilot.api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ../../:/app
    environment:
      DATABASE_URL: postgresql://mix:mix_password@postgres:5432/mix_local
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: mix_local
      MINIO_SECRET_KEY: change_me_local_only
      OLLAMA_BASE_URL: http://ollama:11434
      CLOUD_AI_ENABLED: "false"
    depends_on:
      - postgres
      - redis
      - minio
      - ollama

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.local.txt && python -m local_copilot.worker"
    volumes:
      - ../../:/app
    environment:
      DATABASE_URL: postgresql://mix:mix_password@postgres:5432/mix_local
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: mix_local
      MINIO_SECRET_KEY: change_me_local_only
      OLLAMA_BASE_URL: http://ollama:11434
      CLOUD_AI_ENABLED: "false"
    depends_on:
      - postgres
      - redis
      - minio
      - ollama

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mix
      POSTGRES_PASSWORD: mix_password
      POSTGRES_DB: mix_local
    ports:
      - "5433:5432"
    volumes:
      - mix_local_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - mix_local_redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mix_local
      MINIO_ROOT_PASSWORD: change_me_local_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mix_local_minio:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - mix_local_ollama:/root/.ollama

volumes:
  mix_local_postgres:
  mix_local_redis:
  mix_local_minio:
  mix_local_ollama:
